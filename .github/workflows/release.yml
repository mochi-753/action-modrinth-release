name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version (e.g., v1.0.0)
        required: true
        type: string

concurrency:
  group: ${{ github.workflows }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup NodeJS
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Build
        run: npm i && npm run build

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "Release ${{ inputs.version }}"
          git push -u origin main

      - name: Create release tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          echo "previous_tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}" HEAD
          git push origin "${{ inputs.version }}"
          echo "release_tag=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: "action-modrinth-release ${{ steps.tag.outputs.release_tag }}"
          tag_name: ${{ steps.tag.outputs.release_tag }}
          generate_release_notes: true
          previous_tag: ${{ steps.tag.outputs.previous_tag }}
